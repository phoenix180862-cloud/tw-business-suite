<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Variante A — 3 Gruppen · 7 Figuren</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(180deg, #0f1419 0%, #1a2332 60%, #2c3e50 100%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #ecf0f1;
    overflow-x: hidden;
  }
  .label {
    text-align:center;
    padding: 40px 20px 12px;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 2px;
  }
  .label strong { font-weight: 700; color: #e74c3c; }
  .sub { text-align:center; opacity:0.6; font-size:13px; margin-bottom:30px; }
  .group-indicator {
    text-align:center;
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
    min-height: 22px;
  }
  .group-indicator strong { color: #f1c40f; font-weight: 600; }

  /* ═══ SZENE ═══ */
  .scene {
    position: relative;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    height: 420px;
    overflow: hidden;
    background: linear-gradient(180deg,
      #1a2540 0%,
      #2c3e50 40%,
      #3d5060 70%,
      #5d6d7e 100%);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* Sonne */
  .sun {
    position: absolute;
    top: 60px;
    right: 15%;
    width: 90px;
    height: 90px;
    background: radial-gradient(circle, #f39c12 0%, #e67e22 50%, transparent 75%);
    border-radius: 50%;
    filter: blur(2px);
    animation: sunGlow 4s ease-in-out infinite;
  }
  @keyframes sunGlow {
    0%,100% { opacity: 0.85; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* Parallax */
  .layer-far {
    position:absolute; bottom: 120px; left: 0; right: 0;
    height: 120px;
    animation: parallaxFar 60s linear infinite;
  }
  .layer-mid {
    position:absolute; bottom: 100px; left: 0; right: 0;
    height: 140px;
    animation: parallaxMid 40s linear infinite;
  }
  @keyframes parallaxFar {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @keyframes parallaxMid {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* Boden */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 100px;
    background:
      linear-gradient(180deg,
        #34495e 0%,
        #2c3e50 30%,
        #1a2530 100%);
  }
  .ground::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(231,76,60,0.6), transparent);
  }
  .tile-pattern {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100px;
    background-image:
      linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
    background-size: 30px 30px;
  }

  /* Details am Boden */
  .tile-stack { position: absolute; bottom: 85px; left: 10%; }
  .tool-stack { position: absolute; bottom: 80px; right: 8%; }

  /* Staub */
  .dust {
    position: absolute;
    width: 4px; height: 4px;
    background: radial-gradient(circle, rgba(241,196,15,0.4), transparent);
    border-radius: 50%;
    animation: dustFloat linear infinite;
  }
  @keyframes dustFloat {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.6; }
    100% { transform: translateY(-80px) translateX(30px); opacity: 0; }
  }

  /* ═══ GRUPPEN-CONTAINER ═══
     Jede Gruppe hat eigene Animation mit Delay, sodass sie nacheinander durchlaufen.
     Zykluslänge: 45s total (15s pro Gruppe).
  */
  .group {
    position: absolute;
    bottom: 90px;
    display: flex;
    gap: 22px;
    align-items: flex-end;
    left: -400px;
    opacity: 0;
  }
  .group-1 {
    animation: walkCycle 45s linear infinite;
    animation-delay: 0s;
  }
  .group-2 {
    animation: walkCycle 45s linear infinite;
    animation-delay: 15s;
  }
  .group-3 {
    animation: walkCycle 45s linear infinite;
    animation-delay: 30s;
  }
  @keyframes walkCycle {
    0%    { left: -400px; opacity: 1; }
    33.3% { left: 100%; opacity: 1; }
    33.4% { left: 100%; opacity: 0; }
    100%  { left: 100%; opacity: 0; }
  }

  /* ═══ FIGUR-ANIMATION ═══ */
  .figure {
    position: relative;
    width: 100px;
    height: 180px;
    animation: bodyBob 0.5s ease-in-out infinite;
  }
  @keyframes bodyBob {
    0%, 100% { transform: translateY(0); }
    25% { transform: translateY(-3px); }
    50% { transform: translateY(-1px); }
    75% { transform: translateY(-3px); }
  }

  .leg-l { animation: legLeft 1s ease-in-out infinite; transform-origin: top center; }
  .leg-r { animation: legRight 1s ease-in-out infinite; transform-origin: top center; }
  .arm-l { animation: armLeft 1s ease-in-out infinite; transform-origin: top center; }
  .arm-r { animation: armRight 1s ease-in-out infinite; transform-origin: top center; }

  @keyframes legLeft {
    0%,100% { transform: rotate(25deg); }
    25%     { transform: rotate(0deg); }
    50%     { transform: rotate(-25deg); }
    75%     { transform: rotate(0deg); }
  }
  @keyframes legRight {
    0%,100% { transform: rotate(-25deg); }
    25%     { transform: rotate(0deg); }
    50%     { transform: rotate(25deg); }
    75%     { transform: rotate(0deg); }
  }
  @keyframes armLeft {
    0%,100% { transform: rotate(-20deg); }
    50%     { transform: rotate(20deg); }
  }
  @keyframes armRight {
    0%,100% { transform: rotate(20deg); }
    50%     { transform: rotate(-20deg); }
  }

  /* Phasenverschiebung, damit nicht alle synchron laufen */
  .phase-2 { animation-delay: -0.25s; }
  .phase-3 { animation-delay: -0.5s; }

  .shadow {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 14px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.5), transparent 70%);
    filter: blur(3px);
  }

  /* Silke zierlicher */
  .figure-silke {
    width: 90px;
    height: 170px;
  }
</style>
</head>
<body>

<div class="label">Variante <strong>A</strong> — 3 Gruppen im Wechsel</div>
<div class="sub">Gruppe 1: Ivan · Michal · Iurii &nbsp;|&nbsp; Gruppe 2: Peter · Luca (AM) &nbsp;|&nbsp; Gruppe 3: Luca · Silke (Big Boss)</div>

        <!-- LANGE HAARE im Rücken (Pferdeschwanz hinter dem Helm) -->

        <!-- Kopf — feminin (etwas schmaler, softere Züge) -->

<div class="group-indicator">
  Derzeit sichtbar: <strong id="current-group">Gruppe 1</strong>
</div>

<div style="text-align:center; margin-top:10px; opacity:0.5; font-size:12px;">
  Gruppenwechsel alle 15 Sekunden · Gesamtzyklus 45 Sekunden
</div>

<script>
  // Staubpartikel
  const container = document.getElementById('dust-container');
  for (let i = 0; i < 25; i++) {
    const dust = document.createElement('div');
    dust.className = 'dust';
    dust.style.left = Math.random() * 100 + '%';
    dust.style.bottom = (50 + Math.random() * 60) + 'px';
    dust.style.animationDuration = (3 + Math.random() * 4) + 's';
    dust.style.animationDelay = Math.random() * 5 + 's';
    dust.style.opacity = 0.3 + Math.random() * 0.5;
    container.appendChild(dust);
  }

  // Gruppen-Anzeige (optional, zeigt welche Gruppe gerade läuft)
  const groupLabel = document.getElementById('current-group');
  const groups = [
    'Gruppe 1 — Ivan · Michal · Iurii',
    'Gruppe 2 — Peter · Luca (AM s.r.o.)',
    'Gruppe 3 — Luca · Silke (BIG BOSS)'
  ];
  let idx = 0;
  groupLabel.textContent = groups[0];
  setInterval(() => {
    idx = (idx + 1) % 3;
    groupLabel.textContent = groups[idx];
  }, 15000);
</script>
