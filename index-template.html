<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- CACHE-BUST: Verhindert, dass Browser alte Versionen aus dem Cache ausliefern.
         GitHub Pages liefert sonst manchmal bis zu 10 Minuten lang eine veraltete
         index.html, was zu ReferenceErrors fuehrt, weil referenzierte Funktionen
         in der alten, aber nicht in der neuen Version fehlen. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script>
    // ═══ TW Debug-Flags ═══
    // Memory-Leak-Diagnose ist abgeschlossen (25.04.2026). Flag-Parser entfernt.
    // Falls jemals wieder ein Diagnose-Modus benoetigt wird: vorherige Versionen im Git-Log.
    </script>

    <script>
    // ═══ CRASH-DIAGNOSE ═══
    // Bei jedem App-Crash zeigen wir direkt auf dem Screen die Infos an,
    // die wir zur Fehleranalyse brauchen — so dass der Thomas nur einen
    // Screenshot machen muss, keine Browser-Konsole oeffnen.

    // Alle Fehler sammeln (auch vor dem Rendering)
    window.__twErrors = [];
    window.onerror = function(msg, url, line, col, error) {
        window.__twErrors.push({msg: msg, line: line, col: col});
        console.error('App Fehler:', msg, 'at', url, line, col);
        showCrashDiag(msg, line, col);
        return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
        window.__twErrors.push({msg: 'Promise: ' + (e.reason && e.reason.message || e.reason)});
        console.error('Unhandled Promise:', e.reason);
    });

    function showCrashDiag(msg, line, col) {
        var d = document.getElementById('crash-info');
        if (!d) {
            d = document.createElement('div');
            d.id = 'crash-info';
            d.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;bottom:10px;padding:16px;background:#0d1117;color:#e6edf3;border:2px solid #ff6b6b;border-radius:12px;z-index:99999;font-family:monospace;font-size:12px;overflow:auto;';
            document.body.appendChild(d);
        }
        var s = window.__twSentinel || {};
        var completed = (s.completedModules || []).join(', ') || '(keins)';
        var lastMod = s.lastModule || '(keins gestartet)';
        var built = s.built || '(unbekannt)';
        var preRender = s.preRenderCheck ? JSON.stringify(s.preRenderCheck, null, 2) : '(nicht erreicht)';

        d.innerHTML =
            '<h3 style="color:#ff6b6b;margin:0 0 10px;font-size:15px">⚠️ App-Fehler — DIAGNOSE</h3>' +
            '<div style="color:#ff9999;margin-bottom:8px"><b>Fehler:</b> ' + msg + '</div>' +
            '<div style="color:#7a8a9e;margin-bottom:12px;font-size:11px">Zeile ' + (line||'?') + ':' + (col||'?') + '</div>' +
            '<div style="background:#161b22;padding:10px;border-radius:6px;margin-bottom:10px;border-left:3px solid #58a6ff">' +
            '<div style="color:#58a6ff;font-weight:bold;margin-bottom:4px">BUILD-VERSION</div>' +
            '<div style="color:#d2a8ff">' + built + '</div></div>' +

            '<div style="background:#161b22;padding:10px;border-radius:6px;margin-bottom:10px;border-left:3px solid #3fb950">' +
            '<div style="color:#3fb950;font-weight:bold;margin-bottom:4px">MODULE GELADEN</div>' +
            '<div style="color:#e6edf3;font-size:10px;line-height:1.5">' + completed + '</div></div>' +

            '<div style="background:#161b22;padding:10px;border-radius:6px;margin-bottom:10px;border-left:3px solid #f0883e">' +
            '<div style="color:#f0883e;font-weight:bold;margin-bottom:4px">ABGEBROCHEN BEI</div>' +
            '<div style="color:#e6edf3">' + lastMod + '</div></div>' +

            '<div style="background:#161b22;padding:10px;border-radius:6px;margin-bottom:10px;border-left:3px solid #bc8cff">' +
            '<div style="color:#bc8cff;font-weight:bold;margin-bottom:4px">FUNKTIONEN DEFINIERT</div>' +
            '<pre style="margin:0;white-space:pre-wrap;color:#e6edf3;font-size:10px">' + preRender + '</pre></div>' +

            '<div style="background:#161b22;padding:10px;border-radius:6px;margin-bottom:10px;border-left:3px solid #ff6b6b">' +
            '<div style="color:#ff6b6b;font-weight:bold;margin-bottom:4px">ALLE FEHLER</div>' +
            '<pre style="margin:0;white-space:pre-wrap;color:#ff9999;font-size:10px">' +
            (window.__twErrors.map(function(e,i){return (i+1)+'. '+e.msg;}).join('\n') || '(keine)') +
            '</pre></div>' +

            '<div style="display:flex;gap:8px;margin-top:12px">' +
            '<button onclick="location.reload(true)" style="flex:1;padding:10px;background:#1E88E5;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold">🔄 Neu laden (Cache umgehen)</button>' +
            '<button onclick="document.getElementById(\'crash-info\').remove()" style="padding:10px 16px;background:#30363d;color:#e6edf3;border:none;border-radius:6px;cursor:pointer">✕</button>' +
            '</div>' +
            '<div style="color:#7a8a9e;margin-top:10px;font-size:10px;text-align:center">Bitte Screenshot an den Entwickler schicken.</div>';
    }

    // Wenn nach 5s kein Render erfolgt ist, automatisch Diagnose anzeigen
    setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
            showCrashDiag('App rendert nicht (kein Kind unter #root nach 5s)', '?', '?');
        }
    }, 5000);
    </script>
